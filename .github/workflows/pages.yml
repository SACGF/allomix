name: Deploy example reports

# Publishes the self-contained example HTML reports (and their per-marker CSVs)
# in docs/examples/ to GitHub Pages. Only those files plus a generated landing
# page are deployed; the rest of the repo is not part of the published site.

on:
  push:
    branches: [main]
    paths:
      - "docs/examples/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp docs/examples/*.html docs/examples/*.csv _site/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>allomix example reports</title>
            <style>
              :root { color-scheme: light dark; }
              body {
                font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
                line-height: 1.5;
                max-width: 46rem;
                margin: 3rem auto;
                padding: 0 1.25rem;
              }
              h1 { margin-bottom: 0.25rem; }
              p.lede { margin-top: 0; color: #666; }
              ul { list-style: none; padding: 0; }
              li {
                border: 1px solid #8883;
                border-radius: 8px;
                padding: 1rem 1.25rem;
                margin: 0.75rem 0;
              }
              li a.title { font-weight: 600; font-size: 1.05rem; text-decoration: none; }
              li a.title:hover { text-decoration: underline; }
              li p { margin: 0.4rem 0 0; }
              .meta { font-size: 0.85rem; color: #777; }
              footer { margin-top: 2.5rem; font-size: 0.85rem; color: #777; }
              a { color: #2563eb; }
            </style>
          </head>
          <body>
            <h1>allomix example reports</h1>
            <p class="lede">
              NGS-based donor chimerism monitoring after HSCT. These reports are built
              from the public SRP434573 mixtures (a public-data demonstration, not
              patient data). The titrated minor contributor (F2) is assigned the host
              role, so the monitored quantity is the host fraction.
            </p>
            <ul>
              <li>
                <a class="title" href="srp434573_single_sample_1pct.html">Single-sample report, 1%</a>
                <p>The headline example: the 1% titration <code>1_99_F2-M1</code>. The
                estimate recovers the 1% host fraction cleanly.</p>
                <p class="meta"><a href="srp434573_single_sample_1pct.markers.csv">per-marker CSV</a></p>
              </li>
              <li>
                <a class="title" href="srp434573_single_sample.html">Single-sample report, 0.5%</a>
                <p>Near the panel's contamination floor: the 0.5% titration
                <code>1_199_F2-M1</code>. The MLE reads slightly low because of a
                donor-homozygous contamination background in this public dataset; the
                host-presence test still detects the residual host signal.</p>
                <p class="meta"><a href="srp434573_single_sample.markers.csv">per-marker CSV</a></p>
              </li>
              <li>
                <a class="title" href="srp434573_dilution_series.html">Dilution series timeline</a>
                <p>The whole F2-into-M1 titration ladder fed to timeline mode to show the
                trend chart. This is a titration series, not serial timepoints from one
                patient.</p>
              </li>
            </ul>
            <footer>
              Generated by <a href="https://github.com/SACGF/allomix">allomix</a>.
              See the <a href="https://github.com/SACGF/allomix/blob/main/docs/reports.md">reports guide</a>.
            </footer>
          </body>
          </html>
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
