# allomix pipeline — RUN config (issue #30).
#
# This file holds only PER-RUN settings: the reference, the panel/intervals,
# which samples to process, where output goes, and the mpileup parameters for
# the panel. Tool locations and machine resources live separately in
# pipeline/tools.yaml (set up once per machine, loaded automatically by the
# Snakefile). To use a tool that is not on PATH, edit tools.yaml, not this file.
#
# One CSV per patient with columns:
#     sample_id,bam_filename,sample_type
# sample_type must be HOST, DONOR, or ADMIX.
# All CSVs in samples_csv_dir are processed in one DAG. To run a single
# patient instead, pass --config samples_csv=path/to/patient.csv (overrides
# the directory).
# Pipeline runs GATK on HOST + DONOR, then forced bcftools mpileup on ADMIX
# at the GATK-derived panel sites — see pipeline/Snakefile for the rationale.
#
# Run from repo root:
#     snakemake -s pipeline/Snakefile --configfile pipeline/config.yaml --cores 16

ref: "/path/to/hg38.fa"
samples_csv_dir: "pipeline/sample_csvs"
output_dir: "output/genotypes"

# Phase 0 (optional) — align FASTQ -> BAM with bwa mem.
# Off by default: leave fastq_dir unset to use pre-aligned BAMs (the CSV
# bam_filename paths are then treated as existing inputs). To enable, set
# fastq_dir + bam_dir; the pipeline aligns <fastq_dir>/<run>.<fastq_suffix> ->
# <bam_dir>/<run>.<bam_suffix>, which must equal the CSV bam_filename paths.
# The reference must be bwa-indexed (`bwa index <ref>`). The read group's SM is
# set to each sample's sample_id from the CSV. BAMs are NOT duplicate-marked.
# (The aligner executable + thread count are in tools.yaml: bwa, align_threads.)
# fastq_dir: "/path/to/fastqs"
# fastq_suffix: "fastq.gz"
# bam_dir: "/path/to/bams"
# bam_suffix: "hg38.bam"

# Phase 1 — GATK
intervals: "/path/to/targets.bed"  # REQUIRED — capture-panel BED restricting GATK to the targeted loci
# Optional fixed panel of (CHROM,POS,REF,ALT) sites. When set:
#   - GenotypeGVCFs uses --force-output-intervals at every panel allele, so
#     every panel site is emitted with a genotype even when GATK would have
#     called it non-variant in HOST+DONOR.
#   - The panel is ADDITIVE on top of `intervals:` above. HaplotypeCaller
#     and GenotypeGVCFs still use `-L <intervals.bed>` so wide-BED variants
#     are discovered as normal; forced panel sites are emitted in addition.
#   - If `intervals:` is not set, the panel VCF is used as -L on its own.
# Build one with: python scripts/build_panel_vcf.py <bed> <existing.vcf.gz> panel.vcf.gz
# panel_alleles_vcf: "/path/to/panel.vcf.gz"

# Phase 2 — bcftools mpileup
max_depth: 100000  # set well above panel coverage so >1000x panels are not capped
min_mapq: 20
min_baseq: 20
read_filters: "UNMAP,SECONDARY,QCFAIL,DUP"
