# One CSV per patient with columns:
#     sample_id,bam_filename,sample_type
# sample_type must be HOST, DONOR, or ADMIX.
# All CSVs in samples_csv_dir are processed in one DAG. To run a single
# patient instead, pass --config samples_csv=path/to/patient.csv (overrides
# the directory).
# Pipeline runs GATK on HOST + DONOR, then forced bcftools mpileup on ADMIX
# at the GATK-derived panel sites — see pipeline/Snakefile for the rationale.

ref: "/path/to/hg38.fa"
samples_csv_dir: "pipeline/sample_csvs"
output_dir: "output/joint_call"

tabix: "tabix"
bgzip: "bgzip"

# Phase 1 — GATK
gatk: "gatk"  # full path if not on PATH, e.g. /tau/tools/gatk-4.1.3.0/gatk
java_mem: "8g"  # Java heap per GATK job
# intervals: "/path/to/targets.bed"  # restrict calling to specific loci (recommended for targeted panels)
# Optional fixed panel of (CHROM,POS,REF,ALT) sites. When set:
#   - GenotypeGVCFs forces a genotype at every panel site
#     (--force-output-intervals + --include-non-variant-sites), so the
#     per-patient panel has the same site set regardless of how many
#     variants GATK discovers in HOST+DONOR alone.
#   - The panel VCF is used as -L intervals for HaplotypeCaller / CombineGVCFs / GenotypeGVCFs.
#   - Overrides `intervals:` above (using both would mask panel sites outside the BED).
# Build one with: python scripts/build_panel_vcf.py <bed> <existing.vcf.gz> panel.vcf.gz
# panel_alleles_vcf: "/path/to/panel.vcf.gz"

# Phase 2 — bcftools mpileup
bcftools: "bcftools"
max_depth: 100000  # set well above panel coverage so >1000x panels are not capped
min_mapq: 20
min_baseq: 20
read_filters: "UNMAP,SECONDARY,QCFAIL,DUP"
